<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HS Admin — Trademark Watch</title>
  <meta name="color-scheme" content="light dark" />
  <style>
    :root {
      --bg: #f8fafc; --card: #fff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --ok: #16a34a; --bad: #dc2626; --accent: #2563eb; --warn: #ca8a04;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: #334155; --accent: #60a5fa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--card); display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; position: sticky; top: 0; z-index: 10; }
    h1 { font-size: 1.125rem; margin: 0; flex: 1; min-width: 8rem; }
    a { color: var(--accent); font-size: 0.875rem; }
    input, button { padding: 0.5rem 0.65rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--bg); color: var(--text); font-size: 0.875rem; }
    button { cursor: pointer; background: var(--card); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    main { padding: 1rem; max-width: 1100px; margin: 0 auto; }
    .err { padding: 0.75rem; background: color-mix(in srgb, var(--bad), transparent 92%); border-radius: 0.375rem; font-size: 0.875rem; }
    .note { padding: 0.75rem; background: color-mix(in srgb, var(--warn), transparent 90%); border-radius: 0.375rem; font-size: 0.8125rem; margin-bottom: 1rem; }
    .searchbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .searchbar input { flex: 1; min-width: 12rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
    th, td { padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { background: color-mix(in srgb, var(--border), transparent 60%); font-weight: 600; }
    .badge { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 0.25rem; border: 1px solid var(--border); white-space: nowrap; }
    .risk-CRITICAL { color: #fff; background: var(--bad); border-color: var(--bad); }
    .risk-HIGH { color: var(--bad); border-color: var(--bad); }
    .risk-MEDIUM { color: var(--warn); border-color: var(--warn); }
    .risk-WATCH { color: var(--muted); }
    .stats { color: var(--muted); font-size: 0.8125rem; margin-bottom: 0.75rem; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Trademark Watch — cảnh báo nhãn hiệu</h1>
    <a href="/admin/index.html">← Dashboard</a>
    <a href="/admin/feedback.html">Feedback</a>
    <input id="token" type="password" placeholder="Bearer token" aria-label="API token" />
    <button type="button" class="primary" id="save-token">Save</button>
    <button type="button" id="theme-toggle">Theme</button>
  </header>
  <main>
    <p id="error" class="err" hidden></p>
    <div class="note">
      ⚖️ Cảnh báo dựa trên watchlist nội bộ (TT 13/2015 &amp; 13/2020/TT-BTC; hải quan chủ động dừng thông quan từ 1/3/2026).
      <strong>Tư vấn tham khảo, không phải phán quyết hải quan.</strong> Dữ liệu seed cần xác minh tại
      <a href="https://iplib.noip.gov.vn" target="_blank" rel="noopener">iplib.noip.gov.vn</a>.
    </div>
    <div class="searchbar">
      <input id="q" type="text" placeholder="Nhãn hiệu (vd: vpower, honda...)" />
      <input id="hs" type="text" placeholder="Mã HS (tuỳ chọn, để cross-check)" style="max-width:14rem" />
      <button type="button" class="primary" id="search">Tra cứu</button>
    </div>
    <p id="stats" class="stats"></p>
    <div id="results"></div>
  </main>
  <script>
    var TOKEN_KEY = 'hs_admin_hs_api_token';
    function getToken() {
      var fromQuery = new URLSearchParams(location.search).get('token');
      if (fromQuery) localStorage.setItem(TOKEN_KEY, fromQuery);
      return localStorage.getItem(TOKEN_KEY) || '';
    }
    function setTheme(pref) {
      if (pref === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('hs_admin_theme', pref);
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function showError(m) { var e = document.getElementById('error'); e.textContent = m; e.hidden = false; }
    function clearError() { var e = document.getElementById('error'); e.hidden = true; }

    async function api(path) {
      var res = await fetch(window.location.origin + path, { headers: { Authorization: 'Bearer ' + getToken() } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    async function loadStats() {
      try {
        var s = await api('/api/trademark?stats=1');
        document.getElementById('stats').innerHTML =
          'Watchlist: <strong>' + s.total + '</strong> nhãn · giám sát hải quan: <strong>' + s.customsRecorded +
          '</strong> · đã xác minh: <strong>' + s.verified + '</strong> · nguồn: ' +
          esc(JSON.stringify(s.bySource));
      } catch (e) { /* token chưa nhập */ }
    }

    function classMatchLabel(cm) {
      if (cm === true) return '<span class="badge" style="color:var(--ok)">cùng nhóm hàng</span>';
      if (cm === false) return '<span class="badge muted">khác nhóm hàng</span>';
      return '<span class="badge muted">n/a</span>';
    }

    async function search() {
      clearError();
      var q = document.getElementById('q').value.trim();
      var hs = document.getElementById('hs').value.trim().replace(/\D/g, '');
      if (q.length < 2) { showError('Nhập tối thiểu 2 ký tự.'); return; }
      try {
        var url = '/api/trademark?q=' + encodeURIComponent(q) + (hs ? '&hs=' + hs : '');
        var data = await api(url);
        var box = document.getElementById('results');
        if (!data.found) {
          box.innerHTML = '<p class="muted">Không tìm thấy nhãn "' + esc(q) + '" trong watchlist. ' +
            'Không có nghĩa là an toàn — hãy tra cứu chính thức tại iplib.noip.gov.vn.</p>';
          return;
        }
        var rows = data.matches.map(function (m) {
          return '<tr>' +
            '<td><strong>' + esc(m.mark) + '</strong></td>' +
            '<td><span class="badge risk-' + esc(m.riskLevel) + '">' + esc(m.riskLevel) + '</span></td>' +
            '<td>' + (m.customsRecorded ? '🛃 có' : '—') + '</td>' +
            '<td>' + esc(m.status) + (m.verified ? '' : ' <span class="badge muted">seed</span>') + '</td>' +
            '<td>' + esc((m.niceClasses || []).join(', ')) + '</td>' +
            '<td>' + (hs ? classMatchLabel(m.classMatch) : '<span class="muted">—</span>') + '</td>' +
            '<td>' + esc(m.owner || '—') + '</td>' +
            '<td class="muted">' + esc(m.source) + '</td>' +
          '</tr>';
        }).join('');
        box.innerHTML =
          '<table><thead><tr><th>Nhãn</th><th>Rủi ro</th><th>Giám sát HQ</th><th>Trạng thái</th>' +
          '<th>Nhóm Nice</th><th>Cross-check HS</th><th>Chủ sở hữu</th><th>Nguồn</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table>' +
          '<p class="muted" style="margin-top:0.75rem">' + esc(data.disclaimer || '') + '</p>';
      } catch (e) {
        showError(e.message === 'HTTP 401' ? 'Unauthorized — kiểm tra token.' : 'Lỗi: ' + e.message);
      }
    }

    document.getElementById('save-token').addEventListener('click', function () {
      localStorage.setItem(TOKEN_KEY, document.getElementById('token').value.trim());
      clearError(); loadStats();
    });
    document.getElementById('search').addEventListener('click', search);
    document.getElementById('q').addEventListener('keydown', function (e) { if (e.key === 'Enter') search(); });
    document.getElementById('theme-toggle').addEventListener('click', function () {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    window.addEventListener('DOMContentLoaded', function () {
      setTheme(localStorage.getItem('hs_admin_theme') === 'dark' ? 'dark' : 'light');
      document.getElementById('token').value = getToken();
      loadStats();
    });
  </script>
</body>
</html>
